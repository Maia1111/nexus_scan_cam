<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scanner de Câmeras IP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body          { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .navbar       { background: #1e293b !important; border-bottom: 1px solid #334155; }
    .card         { background: #1e293b; border-color: #334155; }
    .table        { color: #e2e8f0; }
    .table thead  { background: #0f172a; }
    .table-hover tbody tr:hover { background: #263548; }
    .form-control, .form-select { background: #0f172a; color: #e2e8f0; border-color: #475569; }
    .form-control:focus, .form-select:focus { background: #0f172a; color: #e2e8f0; border-color: #3b82f6; box-shadow: 0 0 0 .2rem rgba(59,130,246,.25); }
    .modal-content { background: #1e293b; color: #e2e8f0; border-color: #334155; }
    .modal-header { border-color: #334155; }
    .modal-footer { border-color: #334155; }
    .nav-link-active { background: #334155 !important; border-radius: 6px; }
    code { color: #38bdf8; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark px-3">
  <a class="navbar-brand fw-bold" href="/cameras">
    <i class="bi bi-camera-video-fill text-primary"></i> Scanner IP
  </a>
  <div class="ms-auto d-flex align-items-center gap-2">
    <a href="/cameras" class="btn btn-sm {{ 'btn-primary' if request.url.path == '/cameras' else 'btn-outline-secondary' }}">
      <i class="bi bi-camera-video"></i> Câmeras
    </a>
    <a href="/scanner" class="btn btn-sm {{ 'btn-primary' if request.url.path == '/scanner' else 'btn-outline-secondary' }}">
      <i class="bi bi-radar"></i> Scanner
    </a>
    <span class="text-secondary small ms-2">
      <i class="bi bi-person-circle"></i> {{ user.username }}
      <span class="badge bg-secondary ms-1">{{ user.role }}</span>
    </span>
    <a href="/logout" class="btn btn-sm btn-outline-danger ms-2">
      <i class="bi bi-box-arrow-right"></i> Sair
    </a>
  </div>
</nav>

<div class="container-fluid p-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
