{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-exclamation-triangle-fill text-warning"></i> Diagnóstico da Rede</h5>
  <button class="btn btn-warning btn-sm"
          hx-get="/api/diagnostics/run"
          hx-target="#diag-results"
          hx-indicator="#diag-spinner">
    <span id="diag-spinner" class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
    <i class="bi bi-search"></i> Mapear Problemas
  </button>
</div>

<div id="diag-results"
     hx-get="/api/diagnostics/run"
     hx-trigger="load">
  <div class="text-center p-5 text-secondary">
    <div class="spinner-border spinner-border-sm me-2"></div> Analisando...
  </div>
</div>

{% endblock %}
