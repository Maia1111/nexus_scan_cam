{% extends "base.html" %}
{% block content %}

<div class="page-title">
  <i class="bi bi-activity"></i> Saúde da Rede
</div>

<!-- Cards de ação rápida -->
<div class="row g-3 mb-4">
  <div class="col-md-6">
    <div class="card p-3">
      <div class="d-flex align-items-center gap-3">
        <div style="font-size:2rem; color: #3b82f6;">
          <i class="bi bi-search-heart"></i>
        </div>
        <div class="flex-grow-1">
          <div class="fw-semibold">Verificar câmeras</div>
          <small class="text-secondary">Analisa conflitos, status e problemas de configuração</small>
        </div>
        <button class="btn btn-primary btn-sm"
                hx-get="/api/diagnostics/run"
                hx-target="#diag-results"
                hx-indicator="#diag-spinner">
          <span id="diag-spinner" class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
          <i class="bi bi-play-fill"></i> Verificar
        </button>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card p-3">
      <div class="d-flex align-items-center gap-3">
        <div style="font-size:2rem; color: #22c55e;">
          <i class="bi bi-shield-check"></i>
        </div>
        <div>
          <div class="fw-semibold">O que é verificado?</div>
          <small class="text-secondary">
            Status online · Conflito IP/MAC · MAC duplicado · Credenciais ausentes
          </small>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Resultados (carregados automaticamente) -->
<div id="diag-results"
     hx-get="/api/diagnostics/run"
     hx-trigger="load">
  <div class="card text-center py-5">
    <div class="text-primary" style="font-size:2.5rem;">
      <div class="spinner-border"></div>
    </div>
    <p class="mt-3 text-secondary">Analisando a rede...</p>
  </div>
</div>

{% endblock %}
