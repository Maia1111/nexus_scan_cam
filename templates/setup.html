{% extends "base.html" %}
<!-- Sobrescrever sidebar para não aparecer no setup -->
{% block sidebar %}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card p-4" style="width: 100%; max-width: 400px; background: var(--bg-card);">
    <div class="text-center mb-4">
      <div class="display-6 text-primary mb-2"><i class="bi bi-shield-lock-fill"></i></div>
      <h4 class="fw-bold">Primeiro Acesso</h4>
      <p class="text-secondary small">Crie sua conta de administrador para começar.</p>
    </div>

    <form hx-post="/api/setup" hx-target="#setup-error" hx-swap="innerHTML">
      <div class="mb-3">
        <label class="form-label">Nome de Usuário</label>
        <input type="text" name="username" class="form-control" required placeholder="ex: admin">
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmar Senha</label>
        <input type="password" name="confirm_password" class="form-control" required placeholder="••••••••">
      </div>
      
      <div id="setup-error"></div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
        Criar Admin e Entrar <i class="bi bi-arrow-right-short"></i>
      </button>
    </form>
    
    <div class="mt-4 pt-3 border-top border-secondary opacity-50 text-center">
      <small class="text-secondary">Nexus Scan IP Cam — Configuração Inicial</small>
    </div>
  </div>
</div>
{% endblock %}
