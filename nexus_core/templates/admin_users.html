{% extends "base.html" %}
{% block content %}
<div class="page-title">
  <i class="bi bi-people"></i> Gerenciamento de Usuários
</div>

<!-- Modal Editar Usuário -->
<div class="modal fade" id="userEditModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Editar Usuário — <span id="edit-username"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="user-edit-result"></div>
        <form id="user-edit-form">
          <div class="mb-3">
            <label class="form-label text-secondary">Perfil</label>
            <select name="role" id="edit-role" class="form-select">
              <option value="VIEWER">Visualizador</option>
              <option value="ADMIN">Administrador</option>
            </select>
          </div>
          <div class="mb-3" id="edit-active-row">
            <label class="form-label text-secondary d-block">Status</label>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="is_active" id="edit-is-active">
              <label class="form-check-label" for="edit-is-active">Usuário ativo</label>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label text-secondary">Nova senha <small class="text-muted">(deixe em branco para não alterar)</small></label>
            <input type="password" name="new_password" id="edit-new-password" class="form-control" placeholder="••••••" autocomplete="new-password">
          </div>
          <div class="mb-1">
            <label class="form-label text-secondary">Confirmar nova senha</label>
            <input type="password" name="confirm_password" id="edit-confirm-password" class="form-control" placeholder="••••••" autocomplete="new-password">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="submitUserEdit()">
          <i class="bi bi-save me-1"></i>Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <!-- Formulário de Novo Usuário -->
  <div class="col-md-4">
    <div class="card p-3">
      <h6 class="mb-3">Novo Usuário</h6>
      <div id="create-user-result"></div>
      <form id="create-user-form">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autocomplete="off">
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="form-control" required autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar Senha</label>
          <input type="password" name="confirm_password" id="create-confirm-password" class="form-control" required autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">Permissão</label>
          <select name="role" class="form-select">
            <option value="VIEWER">Visualizador</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </div>
        <button type="button" class="btn btn-primary btn-sm w-100" onclick="submitCreateUser()">
          <i class="bi bi-plus-lg"></i> Criar Usuário
        </button>
      </form>
    </div>
  </div>

  <!-- Lista de Usuários -->
  <div class="col-md-8">
    <div class="card p-3" id="user-table-container" hx-get="/partials/admin/users" hx-trigger="load">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-primary"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function submitCreateUser() {
  const form = document.getElementById('create-user-form');
  const result = document.getElementById('create-user-result');
  const pw = form.querySelector('[name=password]').value;
  const confirm = form.querySelector('[name=confirm_password]').value;
  if (pw !== confirm) {
    result.innerHTML = '<div class="alert alert-danger py-1 small mb-2">As senhas não coincidem.</div>';
    return;
  }
  result.innerHTML = '';
  const data = new FormData(form);
  const resp = await fetch('/api/admin/users', { method: 'POST', body: data });
  const html = await resp.text();
  if (!resp.ok) {
    result.innerHTML = html;
    return;
  }
  document.getElementById('user-table-container').innerHTML = html;
  form.reset();
}

let editingUserId = null;

function openUserEditModal(id, username, role, isActive, isSelf) {
  editingUserId = id;
  document.getElementById('edit-username').textContent = username;
  document.getElementById('edit-role').value = role;
  document.getElementById('edit-is-active').checked = isActive;
  document.getElementById('edit-new-password').value = '';
  document.getElementById('edit-confirm-password').value = '';
  document.getElementById('user-edit-result').innerHTML = '';
  // Não permite desativar a própria conta
  document.getElementById('edit-active-row').style.display = isSelf ? 'none' : '';
  new bootstrap.Modal(document.getElementById('userEditModal')).show();
}

async function submitUserEdit() {
  const form = document.getElementById('user-edit-form');
  const result = document.getElementById('user-edit-result');
  const newPw = document.getElementById('edit-new-password').value;
  const confirmPw = document.getElementById('edit-confirm-password').value;
  if (newPw && newPw !== confirmPw) {
    result.innerHTML = '<div class="alert alert-danger py-1 small">As senhas não coincidem.</div>';
    return;
  }
  const data = new FormData(form);
  // checkbox desmarcado não envia valor, força "off"
  if (!form.querySelector('[name=is_active]').checked) {
    data.set('is_active', 'off');
  }
  result.innerHTML = '';
  const resp = await fetch(`/api/admin/users/${editingUserId}/edit`, { method: 'POST', body: data });
  const html = await resp.text();
  if (!resp.ok) {
    result.innerHTML = html;
    return;
  }
  document.getElementById('user-table-container').innerHTML = html;
  bootstrap.Modal.getInstance(document.getElementById('userEditModal')).hide();
}
</script>
{% endblock %}
