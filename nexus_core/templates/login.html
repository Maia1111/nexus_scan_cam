<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Scanner IP</title>
  <link rel="stylesheet" href="/static/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
  <style>
    body { background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1e293b; border-color: #334155; width: 380px; }
    .form-control { background: #0f172a; color: #e2e8f0; border-color: #475569; }
    .form-control:focus { background: #0f172a; color: #e2e8f0; border-color: #3b82f6; box-shadow: 0 0 0 .2rem rgba(59,130,246,.25); }
    .form-label { color: #94a3b8; }
  </style>
</head>
<body>
<div class="card p-4 shadow-lg">
  <div class="text-center mb-4">
    <i class="bi bi-camera-video-fill text-primary" style="font-size: 2rem;"></i>
    <h5 class="mt-2 mb-0">Scanner de Câmeras IP</h5>
    <small class="text-secondary">Acesso ao sistema</small>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">
    <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>
  </form>
</div>
</body>
</html>
