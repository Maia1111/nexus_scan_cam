<div class="table-responsive">
  <table class="table table-dark table-hover align-middle mb-0">
    <thead>
      <tr>
        <th>Usuário</th>
        <th>Papel</th>
        <th>Status</th>
        <th class="text-end">Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle text-secondary"></i>
            <span>{{ u.username }}</span>
          </div>
        </td>
        <td>
          {% if u.role == 'ADMIN' %}
          <span class="badge bg-primary-subtle text-primary border border-primary">ADMIN</span>
          {% else %}
          <span class="badge bg-secondary-subtle text-secondary border border-secondary">VIEWER</span>
          {% endif %}
        </td>
        <td>
          {% if u.is_active %}
          <span class="text-success small"><i class="bi bi-check-circle-fill"></i> Ativo</span>
          {% else %}
          <span class="text-danger small"><i class="bi bi-x-circle-fill"></i> Inativo</span>
          {% endif %}
        </td>
        <td class="text-end">
          {% if u.username != current_user.username %}
          <button class="btn btn-sm btn-outline-{{ 'danger' if u.is_active else 'success' }}"
                  hx-post="/api/admin/users/{{ u.id }}/toggle"
                  hx-target="#user-table-container">
            <i class="bi bi-{{ 'person-dash' if u.is_active else 'person-check' }}"></i>
          </button>
          {% else %}
          <small class="text-muted italic">(você)</small>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
